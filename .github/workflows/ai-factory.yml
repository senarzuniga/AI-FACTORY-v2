name: AI Factory v2

on:
  # Run daily at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (analyse only, do not create PR)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write   # create branches and commit files
  pull-requests: write  # open pull requests

jobs:
  ai-factory:
    name: Run AI Factory v2 Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the analyser can read all files

      # ── 2. Set up Python ────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-factory-v2/requirements.txt

      # ── 3. Install dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: pip install -r ai-factory-v2/requirements.txt

      # ── 4. Run orchestrator ──────────────────────────────────────────
      - name: Run AI Factory v2 Orchestrator
        env:
          # Use a PAT stored as secret AI_FACTORY_TOKEN to enable multi-repo mode.
          # If AI_FACTORY_TOKEN is not set, falls back to the built-in GITHUB_TOKEN
          # which is scoped only to this repository.
          GITHUB_TOKEN: ${{ secrets.AI_FACTORY_TOKEN || secrets.GITHUB_TOKEN }}
          # Set to ALL in repo Variables (or leave unset) to analyse all owned repos.
          # Requires AI_FACTORY_TOKEN with full repo scope.
          GITHUB_REPOSITORY: ${{ vars.GITHUB_REPOSITORY || 'ALL' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o' }}
          AI_MAX_TOKENS: ${{ vars.AI_MAX_TOKENS || '4096' }}
          AI_TEMPERATURE: ${{ vars.AI_TEMPERATURE || '0.3' }}
          SKIP_REPOS: ${{ vars.SKIP_REPOS || '' }}
          TARGET_OWNERS: ${{ vars.TARGET_OWNERS || '' }}
          MAX_REPOS_PER_RUN: ${{ vars.MAX_REPOS_PER_RUN || '0' }}
          SKIP_FORKS: ${{ vars.SKIP_FORKS || 'true' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          cd ai-factory-v2
          python orchestrator.py

      # ── 5. Commit learning history back to main ────────────────────
      - name: Commit learning history
        if: always()
        run: |
          git config --local user.email "ai-factory[bot]@users.noreply.github.com"
          git config --local user.name "AI Factory v2"
          git add ai-factory-v2/learning/history.json || true
          git diff --staged --quiet || git commit -m "chore: update learning history [skip ci]"
          git push || true

      # ── 6. Upload learning history as artifact ───────────────────────
      - name: Upload learning history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-factory-learning-${{ github.run_id }}
          path: ai-factory-v2/learning/history.json
          if-no-files-found: ignore

      - name: Upload cycle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-factory-cycle-reports-${{ github.run_id }}
          path: ai-factory-v2/output/cycles/
          if-no-files-found: ignore
